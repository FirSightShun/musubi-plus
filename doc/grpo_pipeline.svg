<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400"
     font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#6B7280"/>
    </marker>
    <filter id="sh">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000015"/>
    </filter>
  </defs>

  <!-- ① Prompt Dataset -->
  <rect x="20" y="155" width="120" height="90" rx="10" fill="#F5F3FF" stroke="#A78BFA" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="20" y="155" width="120" height="32" rx="10" fill="#7C3AED"/>
  <rect x="20" y="175" width="120" height="12" fill="#7C3AED"/>
  <text x="80" y="175" text-anchor="middle" fill="white" font-size="11" font-weight="600">Prompt</text>
  <text x="80" y="188" text-anchor="middle" fill="white" font-size="11" font-weight="600">Dataset</text>
  <text x="80" y="212" text-anchor="middle" fill="#6D28D9" font-size="10">prompt + ref_image</text>
  <text x="80" y="228" text-anchor="middle" fill="#6B7280" font-size="9">JSONL / txt</text>

  <!-- arrow 1→2 -->
  <line x1="140" y1="200" x2="168" y2="200" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ② Online Sampler (no grad) -->
  <rect x="170" y="120" width="145" height="160" rx="10" fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="170" y="120" width="145" height="32" rx="10" fill="#3B82F6"/>
  <rect x="170" y="140" width="145" height="12" fill="#3B82F6"/>
  <text x="242" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="600">Online Sampler</text>
  <text x="242" y="154" text-anchor="middle" fill="white" font-size="10">no_grad</text>
  <text x="242" y="175" text-anchor="middle" fill="#1E40AF" font-size="10" font-weight="600">G × 完整去噪链</text>
  <text x="242" y="191" text-anchor="middle" fill="#6B7280" font-size="9">FlowMatchScheduler</text>
  <text x="242" y="205" text-anchor="middle" fill="#6B7280" font-size="9">t: 1 → 0</text>
  <rect x="190" y="217" width="105" height="26" rx="6" fill="white" stroke="#93C5FD" stroke-width="1"/>
  <text x="242" y="233" text-anchor="middle" fill="#1E40AF" font-size="9">G 张生成图像</text>
  <text x="242" y="259" text-anchor="middle" fill="#9CA3AF" font-size="8">复用 sample_image_inference()</text>

  <!-- arrow 2→3 -->
  <line x1="315" y1="200" x2="343" y2="200" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ③ Reward Ensemble (no grad) -->
  <rect x="345" y="80" width="160" height="240" rx="10" fill="#FFF7ED" stroke="#FCD34D" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="345" y="80" width="160" height="32" rx="10" fill="#F59E0B"/>
  <rect x="345" y="100" width="160" height="12" fill="#F59E0B"/>
  <text x="425" y="100" text-anchor="middle" fill="white" font-size="11" font-weight="600">Reward Ensemble</text>
  <text x="425" y="115" text-anchor="middle" fill="white" font-size="10">no_grad · 可并行</text>

  <!-- reward pills -->
  <rect x="360" y="128" width="130" height="20" rx="5" fill="white" stroke="#FCD34D" stroke-width="1"/>
  <text x="425" y="142" text-anchor="middle" fill="#92400E" font-size="9">HPSv2 / PickScore / ImageReward</text>
  <rect x="360" y="154" width="130" height="20" rx="5" fill="white" stroke="#FCD34D" stroke-width="1"/>
  <text x="425" y="168" text-anchor="middle" fill="#92400E" font-size="9">CLIP 文本-图像对齐</text>
  <rect x="360" y="180" width="130" height="20" rx="5" fill="white" stroke="#FCD34D" stroke-width="1"/>
  <text x="425" y="194" text-anchor="middle" fill="#92400E" font-size="9">OCR 文本准确率</text>
  <rect x="360" y="206" width="130" height="20" rx="5" fill="white" stroke="#FCD34D" stroke-width="1"/>
  <text x="425" y="220" text-anchor="middle" fill="#92400E" font-size="9">VLM 语义评分 (Qwen2-VL)</text>
  <rect x="360" y="232" width="130" height="20" rx="5" fill="white" stroke="#FCD34D" stroke-width="1"/>
  <text x="425" y="246" text-anchor="middle" fill="#92400E" font-size="9">ΔE00 色彩保真度</text>

  <text x="425" y="305" text-anchor="middle" fill="#6B7280" font-size="9">→ {name: [G]} scores</text>

  <!-- arrow 3→4 -->
  <line x1="505" y1="200" x2="533" y2="200" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ④ MO-GRPO Advantage (no grad) -->
  <rect x="535" y="140" width="140" height="120" rx="10" fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="535" y="140" width="140" height="32" rx="10" fill="#10B981"/>
  <rect x="535" y="160" width="140" height="12" fill="#10B981"/>
  <text x="605" y="160" text-anchor="middle" fill="white" font-size="11" font-weight="600">MO-GRPO</text>
  <text x="605" y="174" text-anchor="middle" fill="white" font-size="10">Advantage</text>
  <text x="605" y="196" text-anchor="middle" fill="#065F46" font-size="10">① 每 reward 组内归一化</text>
  <text x="605" y="212" text-anchor="middle" fill="#6B7280" font-size="9">r_norm = (r - mean) / std</text>
  <text x="605" y="228" text-anchor="middle" fill="#065F46" font-size="10">② 加权聚合</text>
  <text x="605" y="244" text-anchor="middle" fill="#6B7280" font-size="9">A = sum( w_k * r_norm_k )</text>

  <!-- arrow 4→5 -->
  <line x1="675" y1="200" x2="703" y2="200" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ⑤ GRPO Loss (with grad) -->
  <rect x="705" y="120" width="135" height="160" rx="10" fill="#FFF1F2" stroke="#FDA4AF" stroke-width="1.5" filter="url(#sh)"/>
  <rect x="705" y="120" width="135" height="32" rx="10" fill="#E11D48"/>
  <rect x="705" y="140" width="135" height="12" fill="#E11D48"/>
  <text x="772" y="140" text-anchor="middle" fill="white" font-size="11" font-weight="600">GRPO Loss</text>
  <text x="772" y="155" text-anchor="middle" fill="white" font-size="10">with grad</text>
  <text x="772" y="177" text-anchor="middle" fill="#9F1239" font-size="10" font-weight="600">加噪 → 预测速度场</text>
  <text x="772" y="193" text-anchor="middle" fill="#6B7280" font-size="9">x_t = (1-t)*x0 + t*eps</text>
  <text x="772" y="213" text-anchor="middle" fill="#9F1239" font-size="10" font-weight="600">优势加权 MSE</text>
  <text x="772" y="229" text-anchor="middle" fill="#6B7280" font-size="9">L = A * ||v_theta - v*||^2</text>
  <text x="772" y="249" text-anchor="middle" fill="#6B7280" font-size="9">+ beta * ||v_theta - v_ref||^2</text>
  <text x="772" y="265" text-anchor="middle" fill="#6B7280" font-size="9">← KL 惩罚</text>

  <!-- bottom label -->
  <text x="430" y="390" text-anchor="middle" fill="#D1D5DB" font-size="10">① ~ ③ no_grad（采样 + 打分）　　④ ~ ⑤ with grad（计算优势 + 反向传播）</text>
</svg>
