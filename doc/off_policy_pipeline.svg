<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 300" width="640" height="300" font-family="'PingFang SC','Microsoft YaHei','Helvetica Neue',Arial,sans-serif">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>

  <!-- ── Left box: Offline Phase ── -->
  <rect x="20" y="40" width="260" height="220" rx="12" ry="12"
        fill="#EFF6FF" stroke="#93C5FD" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="20" y="40" width="260" height="40" rx="12" ry="12" fill="#3B82F6"/>
  <rect x="20" y="64" width="260" height="16" fill="#3B82F6"/>
  <text x="150" y="67" text-anchor="middle" fill="white" font-size="14" font-weight="600">离线评估阶段</text>
  <text x="150" y="92" text-anchor="middle" fill="#3B82F6" font-size="11">可替换为任意难度指标</text>

  <!-- Step 1 -->
  <rect x="50" y="108" width="200" height="46" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="150" y="127" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="600">指标计算脚本</text>
  <text x="150" y="145" text-anchor="middle" fill="#6B7280" font-size="10">PSNR / SSIM / CLIP / 人工标注 …</text>

  <!-- Arrow down -->
  <line x1="150" y1="154" x2="150" y2="172" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 2 -->
  <rect x="50" y="174" width="200" height="46" rx="8" fill="white" stroke="#93C5FD" stroke-width="1.2"/>
  <text x="150" y="193" text-anchor="middle" fill="#1E40AF" font-size="12" font-weight="600">权重映射函数</text>
  <text x="150" y="211" text-anchor="middle" fill="#6B7280" font-size="10">难度得分  →  浮点权重 w</text>

  <!-- ── Middle: arrow + JSON badge ── -->
  <line x1="280" y1="197" x2="358" y2="197" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <rect x="287" y="158" width="64" height="52" rx="6" fill="#F59E0B" filter="url(#shadow)"/>
  <text x="319" y="177" text-anchor="middle" fill="white" font-size="9" font-weight="700">sample_</text>
  <text x="319" y="189" text-anchor="middle" fill="white" font-size="9" font-weight="700">weights</text>
  <text x="319" y="201" text-anchor="middle" fill="white" font-size="9" font-weight="700">.json</text>

  <!-- ── Right box: Training Phase ── -->
  <rect x="360" y="40" width="260" height="220" rx="12" ry="12"
        fill="#F0FDF4" stroke="#6EE7B7" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="360" y="40" width="260" height="40" rx="12" ry="12" fill="#10B981"/>
  <rect x="360" y="64" width="260" height="16" fill="#10B981"/>
  <text x="490" y="67" text-anchor="middle" fill="white" font-size="14" font-weight="600">训练阶段</text>
  <text x="490" y="92" text-anchor="middle" fill="#10B981" font-size="11">musubi-tuner（框架已支持）</text>

  <!-- Step 3 -->
  <rect x="390" y="108" width="200" height="46" rx="8" fill="white" stroke="#6EE7B7" stroke-width="1.2"/>
  <text x="490" y="127" text-anchor="middle" fill="#065F46" font-size="12" font-weight="600">加载 JSON 权重</text>
  <text x="490" y="145" text-anchor="middle" fill="#6B7280" font-size="10">sample_weight → ItemInfo</text>

  <!-- Arrow down -->
  <line x1="490" y1="154" x2="490" y2="172" stroke="#555" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Step 4 -->
  <rect x="390" y="174" width="200" height="46" rx="8" fill="white" stroke="#6EE7B7" stroke-width="1.2"/>
  <text x="490" y="193" text-anchor="middle" fill="#065F46" font-size="12" font-weight="600">加权 Loss 计算</text>
  <text x="490" y="211" text-anchor="middle" fill="#6B7280" font-size="10">loss = (loss × w).mean()</text>

  <!-- ── Decoupling label ── -->
  <text x="320" y="280" text-anchor="middle" fill="#9CA3AF" font-size="10">两阶段通过标准化 JSON 协议解耦，评估策略可随时替换</text>
</svg>
